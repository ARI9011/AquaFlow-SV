<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AquaFlow SV — Autenticación</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="auth-logo">💧</div>
        <div>
          <h1>AquaFlow SV</h1>
          <p>Monitoreo Hídrico</p>
        </div>
      </div>

      <div class="auth-card">
        <div class="forms-container">

          <div id="login-form" class="auth-form active">
            <h2>Bienvenido</h2>
            <p>Ingresa tu email y contraseña</p>

            <div id="login-error" style="display: none; padding: 12px; background: rgba(255, 61, 94, 0.12); border: 1px solid rgba(255, 61, 94, 0.3); border-radius: 6px; margin-bottom: 16px;">
              <p style="font-size: 12px; color: #ff3d5e; margin: 0;">❌ <span class="error-text"></span></p>
            </div>

            <form action="/auth/login" method="POST">
              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
              </div>

              <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
              </div>

              <button type="submit" class="auth-button">Iniciar Sesión</button>
            </form>

            <div class="auth-divider"><span>O</span></div>

            <button class="auth-toggle" id="btn-to-register">
              ¿No tienes cuenta? Regístrate
            </button>
          </div>

          <div id="register-form" class="auth-form">
            <h2>Crear Cuenta</h2>
            <p>Regístrate para acceder a AquaFlow SV</p>

            <div id="register-success" style="display: none; padding: 12px; background: rgba(34, 224, 134, 0.12); border: 1px solid rgba(34, 224, 134, 0.3); border-radius: 6px; margin-bottom: 16px;">
              <p style="font-size: 12px; color: #22e086; margin: 0;"></p>
            </div>

            <form action="/auth/register" method="POST">
              <div class="form-group">
                <label>Nombre completo</label>
                <input type="text" name="nombre" placeholder="Tu nombre" required>
              </div>

              <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="tu@email.com" required>
              </div>

              <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" id="reg-password" required>
                <span class="password-requirements" style="font-size: 10px; color: #888; margin-top: 4px; display: block;">
                  • Mín. 6 caracteres • 1 mayúscula • 1 número
                </span>
              </div>

              <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" name="passwordConfirm" placeholder="••••••••" required>
              </div>

              <div class="form-group">
                <label>Código de administrador (opcional)</label>
                <input type="password" name="adminCode" placeholder="Ingresa el código si eres admin">
                <span style="font-size: 10px; color: #888; margin-top: 4px; display: block;">
                  💡 Si dejas en blanco, se creará como usuario regular
                </span>
              </div>

              <button type="submit" class="auth-button">Crear Cuenta</button>
            </form>

            <div class="auth-divider"><span>O</span></div>

            <button class="auth-toggle" id="btn-to-login">
              ¿Ya tienes cuenta? Inicia sesión
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

<script src="/JS/script.js"></script>
<script src="/JS/auth.js"></script>
</body>
</html>
